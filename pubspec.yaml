name: simuni
description: A premium, offline-first personal finance intelligence platform for Ethiopia.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & Architecture
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Encrypted Database (Offline First)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  flutter_secure_storage: ^9.2.2

  # Local Hardware & OS Integrations
  flutter_sms_inbox: ^1.0.5
  permission_handler: ^11.3.1
  local_auth: ^2.2.0
  path_provider: ^2.1.3

  # Premium UI, Graphing & Animation Ecosystem
  fl_chart: ^1.2.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  haptic_feedback: ^0.5.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9
  flutter_launcher_icons: "^0.14.0"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  # This must be indented exactly under "flutter:" (2 spaces)
  uses-material-design: true